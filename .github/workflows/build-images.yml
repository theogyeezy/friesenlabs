name: Build images

# Manual-trigger builder for the non-api images the Deploy pipeline does NOT build:
# cube (semantic/), provisioning-lambda, and worker. Each is built arm64 and pushed to
# its ECR repo as an immutable ${GITHUB_SHA::7} tag — same OIDC role + buildx as deploy.yml.
# Use this before a Deploy when semantic/, signup/lambda_handler, worker/, or their deps changed,
# then point the matching image var (cube_image / provisioning_lambda_image) at the new tag.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR: 186052668426.dkr.ecr.us-east-1.amazonaws.com

jobs:
  images:
    runs-on: ubuntu-latest
    # Trust gate: this job assumes the privileged deploy OIDC role and pushes to the prod ECR
    # namespace, and there is no later approval gate (unlike deploy.yml's apply). Restrict it to
    # main so a workflow_dispatch from an arbitrary branch cannot publish an untrusted image.
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: cube (semantic/Dockerfile)
        run: |
          docker buildx build --platform linux/arm64 -f semantic/Dockerfile \
            -t "$ECR/uplift-cube:${GITHUB_SHA::7}" --push semantic
      - name: provisioning-lambda
        # AWS Lambda only accepts the Docker v2 image manifest. buildx defaults to an OCI
        # image index with provenance/SBOM attestations, which Lambda rejects with
        # InvalidParameterValueException ("media type ... is not supported"). Force a single
        # Docker-manifest image: --provenance=false (no attestation index) + docker mediatypes.
        run: |
          docker buildx build --platform linux/arm64 -f provisioning-lambda.Dockerfile \
            --provenance=false --output type=image,oci-mediatypes=false,push=true \
            -t "$ECR/uplift-provisioning:${GITHUB_SHA::7}" .
      - name: worker
        run: |
          docker buildx build --platform linux/arm64 -f worker/Dockerfile \
            -t "$ECR/uplift-worker:${GITHUB_SHA::7}" --push .
      - name: summary
        run: |
          echo "Built + pushed at ${GITHUB_SHA::7}:" >> "$GITHUB_STEP_SUMMARY"
          echo "- $ECR/uplift-cube:${GITHUB_SHA::7}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $ECR/uplift-provisioning:${GITHUB_SHA::7}" >> "$GITHUB_STEP_SUMMARY"
          echo "- $ECR/uplift-worker:${GITHUB_SHA::7}" >> "$GITHUB_STEP_SUMMARY"
