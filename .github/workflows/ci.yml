name: CI

# Trunk-based: trunk is `main` (always green + deployable). Short-lived feat/fix/chore branches PR in.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt ruff
      - name: Lint (advisory)
        continue-on-error: true
        run: ruff check .
      - name: Unit + integration tests
        run: pytest -q
      - name: Multi-tenant isolation gate
        run: python scripts/isolation_test.py

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format check
        run: terraform -chdir=infra fmt -check -recursive
      - name: Validate
        run: |
          terraform -chdir=infra init -backend=false
          terraform -chdir=infra validate

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm ci || npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Playwright e2e
        run: |
          npx playwright install --with-deps chromium
          npx playwright test
