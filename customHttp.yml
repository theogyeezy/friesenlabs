# Amplify Hosting custom security headers for the Uplift SPA (uplift-web).
#
# LOCATION: this file MUST live at the REPOSITORY ROOT — even though the app is a
# monorepo with appRoot=web (infra/modules/web_hosting/main.tf build_spec). Per the
# AWS docs ("Monorepo custom header requirements"): "You must save the customHttp.yml
# file in the root of your repo", using the monorepo applications/appRoot format
# below. Headers here override any set in the Amplify console; a redeploy applies them.
#
# ⚠️ VERIFY ON AN AMPLIFY PREVIEW BEFORE PROD: confirm every header lands on `/` and
# on hashed /assets/* responses, charts render (vega), Hosted-UI login round-trips,
# and Stripe checkout still redirects, before trusting this on friesenlabs.com.
#
# CSP derivation (from the real-mode SPA code, audited 2026-06-11):
#   * script-src:
#       'self'        — Vite emits only external module scripts (no inline <script>).
#       'unsafe-eval' — ⚠️ LOUD WARNING: vega/vega-lite (SpecRenderer.tsx -> vega-embed)
#                       compiles chart expressions with the Function constructor by
#                       default. Without 'unsafe-eval' EVERY dashboard chart breaks.
#                       The safer fix is the AST expression interpreter
#                       (vega-interpreter package + `ast: true` in vega-embed), but
#                       that adds a new npm dependency — follow-up tracked in the
#                       security-audit notes. Until then this stays, deliberately.
#       https://challenges.cloudflare.com — Cloudflare Turnstile api.js (the signup
#                       captcha seam, loaded only when VITE_TURNSTILE_SITE_KEY is set).
#   * connect-src:
#       'self'        — the API is same-origin /api (Amplify custom_rule proxies to the
#                       CloudFront edge); PostHog, when enabled, ingests via the
#                       same-origin /ph reverse proxy (web/src/analytics/posthog.ts).
#       https://*.auth.us-east-1.amazoncognito.com — the Hosted-UI token/refresh/revoke
#                       fetches (web/src/auth/cognito.ts; the pool domain is
#                       uplift-<acct>.auth.us-east-1.amazoncognito.com — wildcarded so a
#                       prefix rename can't break login). The sign-in/sign-out redirects
#                       are top-level navigations and need no CSP allowance.
#       https://challenges.cloudflare.com — Turnstile widget calls.
#   * frame-src https://challenges.cloudflare.com — the Turnstile challenge iframe.
#     Nothing else on the site embeds frames.
#   * style-src 'self' 'unsafe-inline' https://fonts.googleapis.com — React inline
#     style attributes + the Google Fonts stylesheet (Fraunces / Hanken Grotesk /
#     JetBrains Mono are NOT self-hosted; see web/index.html).
#   * font-src https://fonts.gstatic.com — the font files behind that stylesheet.
#   * img-src 'self' data: — the favicon is an inline data: SVG; og.png, founder
#     photos and all other images are bundled. Vega renders SVG with the loader
#     disabled and url-encoding channels schema-rejected, so charts never fetch images.
#   * frame-ancestors 'none' (+ X-Frame-Options DENY for old engines) — nothing
#     legitimately embeds the app; kills clickjacking.
#   * object-src 'none'; base-uri 'self' — standard injection hardening.
#   * Stripe checkout + billing portal are full top-level redirects
#     (window.location.assign), not embedded — no stripe.com entries needed.
#
# NOTE: HSTS only sticks when served over HTTPS (Amplify always is). It applies to
# friesenlabs.com + subdomains (includeSubDomains) — api.friesenlabs.com is HTTPS-only
# already. No `preload` until the owner decides to submit to the preload list.
applications:
  - appRoot: web
    customHeaders:
      - pattern: "**/*"
        headers:
          - key: Strict-Transport-Security
            value: "max-age=31536000; includeSubDomains"
          - key: X-Content-Type-Options
            value: "nosniff"
          - key: Referrer-Policy
            value: "strict-origin-when-cross-origin"
          - key: X-Frame-Options
            value: "DENY"
          - key: Permissions-Policy
            value: "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
          - key: Content-Security-Policy
            value: "default-src 'self'; script-src 'self' 'unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.auth.us-east-1.amazoncognito.com https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
